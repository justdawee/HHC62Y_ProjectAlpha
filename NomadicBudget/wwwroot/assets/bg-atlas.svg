<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <pattern id="dot-grid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#3DD6F5" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Dot field -->
  <rect width="1200" height="600" fill="url(#dot-grid)"/>

  <!-- Globe: outer circle -->
  <ellipse cx="600" cy="300" rx="268" ry="268"
           fill="none" stroke="#3DD6F5" stroke-width="1.2"
           stroke-dasharray="5 9" opacity="0.55"/>

  <!-- Globe: latitude bands -->
  <ellipse cx="600" cy="300" rx="268" ry="107"
           fill="none" stroke="#3DD6F5" stroke-width="1"
           stroke-dasharray="4 8" opacity="0.45"/>
  <ellipse cx="600" cy="300" rx="268" ry="53"
           fill="none" stroke="#3DD6F5" stroke-width="0.8"
           stroke-dasharray="3 8" opacity="0.35"/>

  <!-- Globe: meridians -->
  <ellipse cx="600" cy="300" rx="107" ry="268"
           fill="none" stroke="#3DD6F5" stroke-width="1"
           stroke-dasharray="4 8" opacity="0.45"/>
  <ellipse cx="600" cy="300" rx="53" ry="268"
           fill="none" stroke="#3DD6F5" stroke-width="0.8"
           stroke-dasharray="3 8" opacity="0.35"/>

  <!-- Equator -->
  <line x1="332" y1="300" x2="868" y2="300"
        stroke="#3DD6F5" stroke-width="0.8"
        stroke-dasharray="3 8" opacity="0.3"/>
</svg>
