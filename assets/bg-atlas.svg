<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <clipPath id="globe-clip">
      <circle cx="400" cy="400" r="380"/>
    </clipPath>
  </defs>

  <!-- Globe boundary -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="#3DD6F5" stroke-width="0.8" opacity="0.35"/>

  <!-- Latitude lines (horizontal ellipses) -->
  <ellipse cx="400" cy="400" rx="380" ry="10"  fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="370" ry="60"  fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="340" ry="130" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="290" ry="200" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="220" ry="270" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="130" ry="325" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.20" clip-path="url(#globe-clip)"/>

  <!-- Longitude lines (vertical ellipses) -->
  <ellipse cx="400" cy="400" rx="10"  ry="380" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="60"  ry="380" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="130" ry="380" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="200" ry="380" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="270" ry="380" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.25" clip-path="url(#globe-clip)"/>
  <ellipse cx="400" cy="400" rx="340" ry="380" fill="none" stroke="#3DD6F5" stroke-width="0.5" opacity="0.20" clip-path="url(#globe-clip)"/>

  <!-- Dot accents at key intersections -->
  <g fill="#3DD6F5" opacity="0.5">
    <circle cx="400" cy="20"  r="2.5"/>
    <circle cx="400" cy="780" r="2.5"/>
    <circle cx="20"  cy="400" r="2.5"/>
    <circle cx="780" cy="400" r="2.5"/>
    <circle cx="135" cy="135" r="1.8"/>
    <circle cx="665" cy="135" r="1.8"/>
    <circle cx="135" cy="665" r="1.8"/>
    <circle cx="665" cy="665" r="1.8"/>
    <circle cx="220" cy="400" r="1.8"/>
    <circle cx="580" cy="400" r="1.8"/>
    <circle cx="400" cy="220" r="1.8"/>
    <circle cx="400" cy="580" r="1.8"/>
    <circle cx="270" cy="270" r="1.5"/>
    <circle cx="530" cy="270" r="1.5"/>
    <circle cx="270" cy="530" r="1.5"/>
    <circle cx="530" cy="530" r="1.5"/>
  </g>

  <!-- Scattered small dots on grid lines -->
  <g fill="#3DD6F5" opacity="0.3">
    <circle cx="460" cy="22"  r="1.2"/>
    <circle cx="340" cy="22"  r="1.2"/>
    <circle cx="330" cy="778" r="1.2"/>
    <circle cx="470" cy="778" r="1.2"/>
    <circle cx="22"  cy="340" r="1.2"/>
    <circle cx="22"  cy="460" r="1.2"/>
    <circle cx="778" cy="340" r="1.2"/>
    <circle cx="778" cy="460" r="1.2"/>
    <circle cx="185" cy="185" r="1.0"/>
    <circle cx="615" cy="185" r="1.0"/>
    <circle cx="185" cy="615" r="1.0"/>
    <circle cx="615" cy="615" r="1.0"/>
    <circle cx="300" cy="140" r="1.0"/>
    <circle cx="500" cy="140" r="1.0"/>
    <circle cx="300" cy="660" r="1.0"/>
    <circle cx="500" cy="660" r="1.0"/>
    <circle cx="140" cy="300" r="1.0"/>
    <circle cx="140" cy="500" r="1.0"/>
    <circle cx="660" cy="300" r="1.0"/>
    <circle cx="660" cy="500" r="1.0"/>
  </g>
</svg>
