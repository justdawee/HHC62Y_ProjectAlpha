name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # dotnet build -c Release triggers ESBuildBundle target which runs:
      #   npm install  ->  node esbuild.config.mjs
      # This produces bundled JS in wwwroot/Scripts/
      - name: Build Release
        run: dotnet build --configuration Release
        working-directory: NomadicBudget

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: NomadicBudget/wwwroot
